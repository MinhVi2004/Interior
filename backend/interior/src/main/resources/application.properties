# =========================
# Server
# =========================
server.port=8080

# =========================
# Application
# =========================
spring.application.name=interior

# =========================
# MySQL Database
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/interior?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================
# File Upload
# =========================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# =========================
# Jackson
# =========================
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# =========================
# JWT
# =========================
jwt.secret=ReplaceWithYourVeryLongSecretKey12345678901234567890
jwt.expiration=86400000

# =========================
# Cloudinary
# =========================
cloudinary.cloud-name=dzom7z5wm
cloudinary.api-key=233452174841661
cloudinary.api-secret=LXO9XcSaPcieVT5RM88bqzPyTy8

# =========================
# Mail
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=root
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================
# Swagger
# =========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =========================
# Logging
# =========================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE